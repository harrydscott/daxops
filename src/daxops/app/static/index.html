<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaxOps</title>
    <link rel="stylesheet" href="/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
<div id="app" x-data="daxops()" x-init="init()">

    <!-- Toast notification -->
    <template x-if="toast">
        <div class="toast" x-text="toast" @click="toast = null"></div>
    </template>

    <!-- Header -->
    <header class="app-header">
        <h1>DaxOps</h1>
        <nav>
            <button :class="{ active: screen === 'dashboard' }" @click="screen = 'dashboard'">Dashboard</button>
            <button :class="{ active: screen === 'findings' }" @click="screen = 'findings'">Findings</button>
            <button :class="{ active: screen === 'score-detail' }" @click="screen = 'score-detail'">Score</button>
            <button :class="{ active: screen === 'settings' }" @click="openSettings()">Settings</button>
        </nav>
        <div class="header-right">
            <template x-if="modelPath">
                <span x-text="modelPath" style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
            </template>
            <template x-if="modelLoaded">
                <div style="display: flex; gap: 8px;">
                    <button class="btn" @click="undoLastChange()" :disabled="loading" title="Undo last fix">Undo</button>
                    <button class="btn" @click="rescan()" :disabled="loading">
                        <span x-show="loading" class="spinner" style="width:14px;height:14px;border-width:2px;margin:0;"></span>
                        Re-scan
                    </button>
                </div>
            </template>
        </div>
    </header>

    <main class="main">

        <!-- Error bar -->
        <template x-if="error">
            <div class="status-bar error">
                <span x-text="error"></span>
                <button class="btn" @click="error = null" style="margin-left:auto; padding:4px 8px;">Dismiss</button>
            </div>
        </template>

        <!-- Loading -->
        <template x-if="loading && !modelLoaded">
            <div class="loading"><span class="spinner"></span> Scanning model...</div>
        </template>

        <!-- No model selected -->
        <template x-if="!modelPath && !loading">
            <div class="empty-state">
                <div class="icon">&#128194;</div>
                <p>No model loaded. Open Settings to select a TMDL folder.</p>
                <button class="btn btn-primary" style="margin-top: 16px;" @click="openSettings()">Select Model Folder</button>
            </div>
        </template>

        <!-- ===== DASHBOARD ===== -->
        <section x-show="screen === 'dashboard' && modelLoaded && !loading">

            <!-- Model info bar -->
            <template x-if="info">
                <div class="status-bar">
                    <strong x-text="info.name"></strong>
                    <span>&mdash;</span>
                    <span x-text="info.tables + ' tables'"></span>
                    <span>&middot;</span>
                    <span x-text="info.measures + ' measures'"></span>
                    <span>&middot;</span>
                    <span x-text="info.columns + ' columns'"></span>
                    <span>&middot;</span>
                    <span x-text="info.relationships + ' relationships'"></span>
                </div>
            </template>

            <!-- Score tiles -->
            <template x-if="scoreData">
                <div>
                    <div style="text-align: center; margin: 24px 0;">
                        <span class="tier-badge" :class="'tier-' + tier" x-text="tierLabel + ' Tier'"
                              style="cursor: pointer;" @click="screen = 'score-detail'"></span>
                    </div>
                    <div class="grid grid-3">
                        <div class="card score-tile" style="cursor: pointer;" @click="screen = 'score-detail'">
                            <div class="card-title">Bronze</div>
                            <div class="score-value" :class="scoreData.summary.bronze_pass ? 'score-pass' : 'score-fail'"
                                 x-text="scoreData.summary.bronze_score"></div>
                            <div class="score-label">
                                min <span x-text="scoreData.summary.thresholds.bronze_min"></span>
                            </div>
                        </div>
                        <div class="card score-tile" style="cursor: pointer;" @click="screen = 'score-detail'">
                            <div class="card-title">Silver</div>
                            <div class="score-value" :class="scoreData.summary.silver_pass ? 'score-pass' : 'score-fail'"
                                 x-text="scoreData.summary.silver_score"></div>
                            <div class="score-label">
                                min <span x-text="scoreData.summary.thresholds.silver_min"></span>
                            </div>
                        </div>
                        <div class="card score-tile" style="cursor: pointer;" @click="screen = 'score-detail'">
                            <div class="card-title">Gold</div>
                            <div class="score-value" :class="scoreData.summary.gold_pass ? 'score-pass' : 'score-fail'"
                                 x-text="scoreData.summary.gold_score"></div>
                            <div class="score-label">
                                min <span x-text="scoreData.summary.thresholds.gold_min"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Findings summary -->
            <template x-if="checkData">
                <div class="card section-gap">
                    <div class="card-title">Health Check Summary</div>

                    <!-- Totals bar -->
                    <div style="display: flex; gap: 16px; align-items: center; margin-top: 8px; margin-bottom: 16px;">
                        <span class="chip chip-error" @click="filterSeverity = 'ERROR'; screen = 'findings'" style="cursor:pointer;">
                            <span x-text="checkData.summary.errors"></span> Errors
                        </span>
                        <span class="chip chip-warning" @click="filterSeverity = 'WARNING'; screen = 'findings'" style="cursor:pointer;">
                            <span x-text="checkData.summary.warnings"></span> Warnings
                        </span>
                        <span class="chip chip-info" @click="filterSeverity = 'INFO'; screen = 'findings'" style="cursor:pointer;">
                            <span x-text="checkData.summary.info"></span> Info
                        </span>
                        <span style="color: var(--text-dim); font-size: 13px;">
                            <span x-text="checkData.summary.total"></span> total
                        </span>
                        <button class="btn btn-primary" style="margin-left: auto;" @click="openFixPreview()" :disabled="fixLoading">
                            <span x-show="fixLoading" class="spinner" style="width:14px;height:14px;border-width:2px;margin:0;"></span>
                            Fix Issues
                        </button>
                    </div>

                    <!-- Rule x Severity matrix -->
                    <template x-if="checkData.summary.by_rule && checkData.summary.by_rule.length > 0">
                        <table class="matrix-table">
                            <thead>
                                <tr>
                                    <th style="text-align: left;">Rule</th>
                                    <th style="text-align: center; width: 80px;">Errors</th>
                                    <th style="text-align: center; width: 80px;">Warnings</th>
                                    <th style="text-align: center; width: 80px;">Info</th>
                                    <th style="text-align: center; width: 70px;">Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="r in checkData.summary.by_rule" :key="r.rule">
                                    <tr style="cursor: pointer;" @click="filterRule = r.rule; filterSeverity = ''; screen = 'findings'">
                                        <td style="font-weight: 500;" x-text="r.rule"></td>
                                        <td style="text-align: center;"><span x-text="r.errors || '—'" :style="r.errors ? 'color: var(--error); font-weight: 600;' : 'color: var(--text-dim);'"></span></td>
                                        <td style="text-align: center;"><span x-text="r.warnings || '—'" :style="r.warnings ? 'color: var(--warning); font-weight: 600;' : 'color: var(--text-dim);'"></span></td>
                                        <td style="text-align: center;"><span x-text="r.info || '—'" :style="r.info ? 'color: var(--info); font-weight: 600;' : 'color: var(--text-dim);'"></span></td>
                                        <td style="text-align: center; font-weight: 600;" x-text="r.total"></td>
                                    </tr>
                                </template>
                            </tbody>
                            <tfoot>
                                <tr style="border-top: 2px solid var(--border);">
                                    <td style="font-weight: 600;">Total</td>
                                    <td style="text-align: center; font-weight: 600; color: var(--error);" x-text="checkData.summary.errors"></td>
                                    <td style="text-align: center; font-weight: 600; color: var(--warning);" x-text="checkData.summary.warnings"></td>
                                    <td style="text-align: center; font-weight: 600; color: var(--info);" x-text="checkData.summary.info"></td>
                                    <td style="text-align: center; font-weight: 600;" x-text="checkData.summary.total"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </template>

                    <template x-if="checkData.findings.length === 0">
                        <div style="margin-top: 12px; color: var(--success); font-weight: 500;">No issues found!</div>
                    </template>
                </div>
            </template>
        </section>

        <!-- ===== FINDINGS ===== -->
        <section x-show="screen === 'findings' && modelLoaded">

            <div class="card">
                <div class="card-title" style="display: flex; align-items: center; justify-content: space-between;">
                    <span>
                        Findings
                        <template x-if="checkData">
                            <span style="font-weight: 400; text-transform: none;" x-text="'(' + filteredFindings.length + ' of ' + checkData.summary.total + ')'"></span>
                        </template>
                    </span>
                    <button class="btn btn-primary" @click="openFixPreview()" :disabled="fixLoading" style="text-transform: none; font-size: 13px;">
                        Fix Selected
                    </button>
                </div>

                <!-- Filter bar -->
                <div class="filter-bar">
                    <input type="text" placeholder="Search findings..." x-model="filterSearch">
                    <select x-model="filterSeverity">
                        <option value="">All severities</option>
                        <option value="ERROR">Errors</option>
                        <option value="WARNING">Warnings</option>
                        <option value="INFO">Info</option>
                    </select>
                    <select x-model="filterRule">
                        <option value="">All rules</option>
                        <template x-for="r in uniqueRules" :key="r">
                            <option :value="r" x-text="r"></option>
                        </template>
                    </select>
                    <select x-model="filterTable">
                        <option value="">All tables</option>
                        <template x-for="t in uniqueTables" :key="t">
                            <option :value="t" x-text="t"></option>
                        </template>
                    </select>
                    <button class="btn" @click="clearFilters()">Clear</button>
                </div>

                <!-- Table -->
                <template x-if="filteredFindings.length > 0">
                    <table class="findings-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"></th>
                                <th>Severity</th>
                                <th>Rule</th>
                                <th>Object</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(f, idx) in filteredFindings" :key="idx">
                                <tr>
                                    <td><span class="sev-icon" :class="sevClass(f.severity)" x-text="sevIcon(f.severity)"></span></td>
                                    <td x-text="f.severity"></td>
                                    <td style="font-weight: 500;" x-text="f.rule"></td>
                                    <td style="color: var(--text-dim);" x-text="f.object_path"></td>
                                    <td>
                                        <div x-text="f.message"></div>
                                        <template x-if="f.recommendation">
                                            <div style="font-size: 12px; color: var(--text-dim); margin-top: 4px;" x-text="f.recommendation"></div>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <template x-if="filteredFindings.length === 0 && checkData">
                    <div class="empty-state">
                        <p>No findings match your filters.</p>
                    </div>
                </template>
            </div>
        </section>

        <!-- ===== SCORE DETAIL ===== -->
        <section x-show="screen === 'score-detail' && modelLoaded">
            <template x-if="scoreData">
                <div>
                    <div style="text-align: center; margin-bottom: 24px;">
                        <span class="tier-badge" :class="'tier-' + tier" x-text="tierLabel + ' Tier'"></span>
                    </div>

                    <template x-for="[tierName, criteria, score, pass_, minVal] in [
                        ['Bronze', scoreData.bronze, scoreData.summary.bronze_score, scoreData.summary.bronze_pass, scoreData.summary.thresholds.bronze_min],
                        ['Silver', scoreData.silver, scoreData.summary.silver_score, scoreData.summary.silver_pass, scoreData.summary.thresholds.silver_min],
                        ['Gold', scoreData.gold, scoreData.summary.gold_score, scoreData.summary.gold_pass, scoreData.summary.thresholds.gold_min]
                    ]" :key="tierName">
                        <div class="card" style="margin-bottom: 16px;">
                            <div style="display: flex; align-items: center; justify-content: space-between; cursor: pointer;"
                                 @click="toggleScoreDetail(tierName)">
                                <div class="card-title" style="margin-bottom: 0;">
                                    <span x-text="tierName"></span>
                                    <span style="font-weight: 400; text-transform: none;" x-text="'(' + score + '/' + minVal + ')'"></span>
                                </div>
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <span class="chip" :class="pass_ ? 'chip-pass' : 'chip-fail'" x-text="pass_ ? 'PASS' : 'FAIL'"></span>
                                    <span x-text="scoreDetailOpen[tierName] ? '\u25B2' : '\u25BC'" style="font-size: 12px; color: var(--text-dim);"></span>
                                </div>
                            </div>

                            <div x-show="scoreDetailOpen[tierName]" style="margin-top: 12px;">
                                <template x-for="c in criteria" :key="c.name">
                                    <div class="criterion-row">
                                        <div style="display: flex; align-items: baseline; gap: 8px;">
                                            <span x-text="c.score === c.max_score ? '\u2713' : c.score > 0 ? '~' : '\u2717'"
                                                  :style="{ color: c.score === c.max_score ? 'var(--success)' : c.score > 0 ? 'var(--warning)' : 'var(--error)', fontWeight: '700', width: '20px' }"></span>
                                            <span style="font-weight: 500;" x-text="c.name"></span>
                                            <span class="score-badge" x-text="c.score + '/' + c.max_score"></span>
                                        </div>
                                        <template x-if="c.details.length > 0">
                                            <div style="margin-left: 28px; margin-top: 4px;">
                                                <template x-for="d in c.details" :key="d">
                                                    <div style="font-size: 12px; color: var(--text-dim);" x-text="d"></div>
                                                </template>
                                            </div>
                                        </template>
                                        <div style="margin-left: 28px; margin-top: 4px; font-size: 12px; font-style: italic;"
                                             :style="{ color: c.score >= c.max_score ? 'var(--success)' : 'var(--warning)' }"
                                             x-text="criterionTip(c)"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </section>

        <!-- ===== SETTINGS ===== -->
        <section x-show="screen === 'settings'">

            <!-- Model Path -->
            <div class="card">
                <div class="card-title">Model Path</div>
                <template x-if="modelPath">
                    <div style="margin-bottom: 12px;">
                        <span style="font-weight: 500;">Current:</span>
                        <span x-text="modelPath"></span>
                    </div>
                </template>

                <!-- Breadcrumb -->
                <div style="font-size: 13px; color: var(--text-dim); margin-bottom: 8px;" x-text="browseCurrent"></div>

                <!-- Navigation buttons -->
                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <button class="btn" @click="browse(browseParent)" :disabled="!browseParent">Up</button>
                    <button class="btn" @click="browse(null)">Home</button>
                </div>

                <!-- Directory listing -->
                <ul class="browser-list">
                    <template x-for="entry in browseEntries.filter(e => e.is_dir)" :key="entry.path">
                        <li class="browser-item" :class="{ 'browser-model': entry.is_model }" @click="entry.is_model ? setModelPath(entry.path) : browse(entry.path)">
                            <span class="icon" x-text="entry.is_model ? '\u2605' : '\uD83D\uDCC1'"></span>
                            <span x-text="entry.name"></span>
                            <template x-if="entry.is_model">
                                <button class="btn btn-primary" style="margin-left: auto; padding: 4px 12px; font-size: 12px;" @click.stop="setModelPath(entry.path)">Open</button>
                            </template>
                        </li>
                    </template>
                </ul>

                <template x-if="browseEntries.filter(e => e.is_dir).length === 0">
                    <div class="empty-state" style="padding: 24px;">No subdirectories found.</div>
                </template>
            </div>

            <!-- Rule Toggles -->
            <div class="card section-gap">
                <div class="card-title">Health Check Rules</div>
                <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 12px;">Toggle rules on/off. Disabled rules won't appear in findings.</p>
                <template x-for="rule in allRules" :key="rule">
                    <label class="rule-toggle">
                        <input type="checkbox" :checked="isRuleEnabled(rule)" @change="toggleRule(rule)">
                        <span x-text="rule"></span>
                    </label>
                </template>
            </div>

            <!-- Score Thresholds -->
            <div class="card section-gap">
                <div class="card-title">Score Thresholds</div>
                <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 12px;">Minimum points required to pass each tier.</p>
                <div class="threshold-grid">
                    <label>
                        <span>Bronze min</span>
                        <input type="number" x-model.number="thresholds.bronze_min" min="0" max="20">
                    </label>
                    <label>
                        <span>Silver min</span>
                        <input type="number" x-model.number="thresholds.silver_min" min="0" max="20">
                    </label>
                    <label>
                        <span>Gold min</span>
                        <input type="number" x-model.number="thresholds.gold_min" min="0" max="20">
                    </label>
                </div>
            </div>

            <!-- Save button -->
            <div style="margin-top: 16px;">
                <button class="btn btn-primary" @click="saveSettings()">Save Settings</button>
            </div>
        </section>

        <!-- ===== FIX PREVIEW MODAL ===== -->
        <template x-if="showFixModal && fixPreview">
            <div class="modal-overlay" @click.self="showFixModal = false">
                <div class="modal">
                    <div class="modal-header">
                        <h2>Fix Preview</h2>
                        <button class="btn" @click="showFixModal = false" style="padding: 4px 8px;">Close</button>
                    </div>

                    <div class="modal-body">
                        <!-- Summary -->
                        <div style="margin-bottom: 16px; font-size: 14px; color: var(--text-dim);">
                            <span x-text="fixPreview.summary.fixable_count"></span> auto-fixes available across
                            <span x-text="fixPreview.summary.files_affected"></span> files.
                            <span x-text="fixPreview.summary.manual_count"></span> findings require manual fixes.
                        </div>

                        <!-- Fixable items -->
                        <template x-if="fixPreview.fixable.length > 0">
                            <div>
                                <div class="card-title">Auto-Fixes</div>
                                <template x-for="(item, idx) in fixPreview.fixable" :key="idx">
                                    <div class="fix-item" :class="{ 'fix-deselected': !isFixSelected(idx) }">
                                        <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer;">
                                            <input type="checkbox" :checked="isFixSelected(idx)" @change="toggleFixItem(idx)">
                                            <span style="font-weight: 500;" x-text="item.rule"></span>
                                            <span style="font-size: 13px; color: var(--text-dim);" x-text="item.description"></span>
                                        </label>
                                        <div class="diff-view">
                                            <div class="diff-pane diff-before">
                                                <div class="diff-label">Before</div>
                                                <pre x-text="item.before"></pre>
                                            </div>
                                            <div class="diff-pane diff-after">
                                                <div class="diff-label">After</div>
                                                <pre x-text="item.after"></pre>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Manual items -->
                        <template x-if="fixPreview.manual.length > 0">
                            <div style="margin-top: 16px;">
                                <div class="card-title">Manual Fixes Required</div>
                                <template x-for="(item, idx) in fixPreview.manual" :key="idx">
                                    <div class="manual-fix-item">
                                        <div style="display: flex; gap: 8px; align-items: baseline;">
                                            <span style="font-weight: 500;" x-text="item.rule"></span>
                                            <span style="color: var(--text-dim); font-size: 13px;" x-text="item.object_path"></span>
                                        </div>
                                        <div style="font-size: 13px;" x-text="item.message"></div>
                                        <template x-if="item.recommendation">
                                            <div style="font-size: 12px; color: var(--text-dim); margin-top: 2px;" x-text="item.recommendation"></div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="modal-footer">
                        <span style="font-size: 13px; color: var(--text-dim);"
                              x-text="fixSelected.length + ' of ' + fixPreview.fixable.length + ' fixes selected'"></span>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn" @click="showFixModal = false">Cancel</button>
                            <button class="btn btn-primary" @click="applyFixes()" :disabled="fixLoading || fixSelected.length === 0">
                                <span x-show="fixLoading" class="spinner" style="width:14px;height:14px;border-width:2px;margin:0;"></span>
                                Apply <span x-text="fixSelected.length"></span> Fixes
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

    </main>
</div>

<script src="/app.js"></script>
</body>
</html>
